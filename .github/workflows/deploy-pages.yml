name: Deploy Website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'hcdf.xsd'
      - 'hcdf-stream-profile.xsd'
      - 'extensions/*.xsd'
      - 'generate_spec_html.py'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install lxml
        run: pip install lxml

      - name: Regenerate spec pages from XSD
        run: |
          python3 generate_spec_html.py hcdf.xsd website/spec/core.html
          python3 generate_spec_html.py hcdf-stream-profile.xsd website/spec/stream-profile.html
          python3 generate_spec_html.py extensions/hcdf-ext-ros2.xsd website/spec/extensions/ros2.html
          python3 generate_spec_html.py extensions/hcdf-ext-gazebo.xsd website/spec/extensions/gazebo.html
          python3 generate_spec_html.py extensions/hcdf-ext-1722.xsd website/spec/extensions/1722.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
